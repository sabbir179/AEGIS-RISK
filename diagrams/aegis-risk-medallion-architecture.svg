<svg xmlns="http://www.w3.org/2000/svg" width="704" height="1530" viewBox="0 0 704 1530" role="img" aria-labelledby="title desc">
  <title id="title">Aegis-Risk Advanced AI-Medallion Architecture</title>
  <desc id="desc">A portrait system architecture diagram showing the Aegis-Risk ingestion, Bronze, Silver, vector RAG, multi-agent reasoning, Gold layer, and Streamlit UI workflow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset="0.55" stop-color="#edf5fb"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="bronze" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b87841"/>
      <stop offset="0.45" stop-color="#f0c49b"/>
      <stop offset="1" stop-color="#fff4e9"/>
    </linearGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c7d0d8"/>
      <stop offset="0.5" stop-color="#f2f5f7"/>
      <stop offset="1" stop-color="#c0c9d2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#caa237"/>
      <stop offset="0.5" stop-color="#f7de7a"/>
      <stop offset="1" stop-color="#fff8d8"/>
    </linearGradient>
    <linearGradient id="openai" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="claude" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3b187"/>
      <stop offset="1" stop-color="#c76d48"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#16324a" flood-opacity="0.13"/>
    </filter>
    <pattern id="woodgrain" width="90" height="70" patternUnits="userSpaceOnUse">
      <path d="M0 15 C25 0, 45 34, 90 8" fill="none" stroke="#7b4b25" stroke-width="2" opacity="0.16"/>
      <path d="M0 45 C32 30, 54 75, 90 37" fill="none" stroke="#7b4b25" stroke-width="1.4" opacity="0.14"/>
      <path d="M18 0 C5 25, 13 47, 0 70" fill="none" stroke="#6f431f" stroke-width="1.2" opacity="0.14"/>
    </pattern>
    <pattern id="metal" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(25)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#8b99a5" stroke-width="1" opacity="0.18"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
    <style>
      .title { font-family: Inter, Arial, sans-serif; font-size: 42px; font-weight: 800; fill: #05070b; text-anchor: middle; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 19px; font-weight: 600; fill: #334155; text-anchor: middle; }
      .label { font-family: Inter, Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #05070b; }
      .body { font-family: Inter, Arial, sans-serif; font-size: 22px; font-weight: 500; fill: #05070b; }
      .small { font-family: Inter, Arial, sans-serif; font-size: 16px; font-weight: 500; fill: #111827; }
      .tiny { font-family: Inter, Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #334155; }
      .chip { font-family: Inter, Arial, sans-serif; font-size: 22px; font-weight: 800; fill: #05070b; text-anchor: middle; }
      .box { stroke-width: 2; filter: url(#softShadow); }
      .arrow { stroke: #111827; stroke-width: 2.7; fill: none; marker-end: url(#arrow); }
      .flow { stroke: #111827; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="704" height="1530" fill="url(#bg)"/>

